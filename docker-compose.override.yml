version: "3.9"
# Auto-applied on: docker compose up (dev mode)
# Production only: docker compose -f docker-compose.yml up -d

services:
  backend:
    volumes:
      - ./backend:/app
      - model-cache:/root/.keras
    environment:
      - ROOT_PATH=/api
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:8000

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
