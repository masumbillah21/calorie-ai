version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calorieai-backend
    volumes:
      - ./backend/model:/app/model:ro
      - model-cache:/root/.keras
    environment:
      - MODEL_PATH=/app/model/food_model.h5
      - CLASS_NAMES_PATH=/app/model/class_names.json
      - ROOT_PATH=/api
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - calorieai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calorieai-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - calorieai-net

  nginx:
    image: nginx:1.25-alpine
    container_name: calorieai-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - calorieai-net

volumes:
  model-cache:

networks:
  calorieai-net:
    driver: bridge
